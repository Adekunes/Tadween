name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # ── Frontend (Vite / React / TypeScript via Deno) ────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build
        run: deno task build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # ── Supabase Edge Functions (Deno) ────────────────────────────────────────
  edge-functions:
    name: Edge Functions — lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint edge functions
        run: deno lint --rules-exclude=no-import-prefix,no-explicit-any,no-unused-vars,no-inner-declarations,no-empty,ban-ts-comment,prefer-const supabase/functions/
        continue-on-error: true
