name: Deno

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint edge functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        # Edge functions use legacy https:// imports (Deno 1.x style, required by Supabase hosting).
        # Exclude no-import-prefix so Deno 2.x doesn't reject them.
        run: deno lint --rules-exclude=no-import-prefix supabase/functions/

      - name: Format check
        # Format check is advisory only — edge functions may use Deno 1.x formatting style.
        run: deno fmt --check supabase/functions/
        continue-on-error: true
