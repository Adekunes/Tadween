name: Deno

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint edge functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint
        # Edge functions use Supabase/Deno 1.x patterns (https:// imports, empty catch blocks,
        # @ts-nocheck on legacy files, any types for dynamic payloads).
        # Exclude style rules that don't apply to serverless edge function patterns.
        run: deno lint --rules-exclude=no-import-prefix,no-explicit-any,no-unused-vars,no-inner-declarations,no-empty,ban-ts-comment,prefer-const supabase/functions/
        continue-on-error: false

      - name: Format check
        run: deno fmt --check supabase/functions/
        continue-on-error: false
